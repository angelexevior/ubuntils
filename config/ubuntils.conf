# ubuntils global configuration

# Paths
LOG_DIR="$(dirname "$(realpath "${BASH_SOURCE[0]:-$0}")")/../logs"
BACKUP_DIR="/var/backups/ubuntils"
DETECT_CACHE="/tmp/ubuntils-detect.cache"
DETECT_CACHE_TTL=3600  # seconds

# Report format: text, html, json (comma-separated for multiple)
REPORT_FORMAT="text"

# Notification channels (set to 1 to enable)
NOTIFY_EMAIL=0
NOTIFY_TELEGRAM=0
NOTIFY_SLACK=0

# Email settings (requires sendmail or msmtp)
EMAIL_TO=""
EMAIL_FROM="ubuntils@localhost"

# Telegram settings
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Slack settings
SLACK_WEBHOOK_URL=""

# Monitor thresholds
LOAD_AVG_WARN=4
LOAD_AVG_CRIT=8
DISK_WARN=80
DISK_CRIT=90
RATE_4XX_WARN=50       # per minute
SLOW_QUERIES_WARN=10   # per minute
FAILED_SSH_WARN=5      # per minute

# Maintenance thresholds
DISK_INODE_WARN=80
DISK_INODE_CRIT=90
APT_PENDING_WARN=10
LOG_ROTATE_DAYS=30
BACKUP_MIN_SIZE_KB=1   # minimum sane backup size

# CVE lookup (requires network, off by default)
CVE_LOOKUP=0
